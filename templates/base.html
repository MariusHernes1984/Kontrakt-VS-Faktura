<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontraktskontroll - Faktura vs Kontrakt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>Kontraktskontroll</h1>
        <nav>
            <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('last_opp_faktura') }}" class="{% if request.endpoint == 'last_opp_faktura' %}active{% endif %}">Last opp faktura</a>
            <a href="{{ url_for('kontrakter_liste') }}" class="{% if request.endpoint in ['kontrakter_liste', 'ny_kontrakt'] %}active{% endif %}">Kontrakter</a>
            <a href="{{ url_for('historikk') }}" class="{% if request.endpoint == 'historikk' %}active{% endif %}">Historikk</a>
            <a href="{{ url_for('varsling') }}" class="{% if request.endpoint == 'varsling' %}active{% endif %}">Varsling</a>
        </nav>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
