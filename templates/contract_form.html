{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Ny kontrakt</h2>
    <p>Registrer en ny leverandorkontrakt</p>
</div>

<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="leverandor_navn">Leverandornavn *</label>
                <input type="text" id="leverandor_navn" name="leverandor_navn" required
                       placeholder="F.eks. Konsulentfirma AS">
            </div>
            <div class="form-group">
                <label for="kontrakt_nummer">Kontraktnummer</label>
                <input type="text" id="kontrakt_nummer" name="kontrakt_nummer"
                       placeholder="F.eks. K-2024-001">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="prosjekt_id">Prosjekt-ID</label>
                <input type="text" id="prosjekt_id" name="prosjekt_id"
                       placeholder="F.eks. PRJ-123">
            </div>
            <div class="form-group">
                <label for="valuta">Valuta</label>
                <select id="valuta" name="valuta">
                    <option value="NOK">NOK</option>
                    <option value="SEK">SEK</option>
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="timepris">Avtalt timepris</label>
                <input type="number" id="timepris" name="timepris" step="0.01"
                       placeholder="F.eks. 1200.00">
            </div>
            <div class="form-group">
                <label for="maks_timer_per_maaned">Maks timer per maned</label>
                <input type="number" id="maks_timer_per_maaned" name="maks_timer_per_maaned"
                       placeholder="F.eks. 160">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="sla_responstid_timer">SLA responstid (timer)</label>
                <input type="number" id="sla_responstid_timer" name="sla_responstid_timer"
                       placeholder="F.eks. 4">
            </div>
            <div class="form-group">
                <label for="avtalt_rabatt_prosent">Avtalt rabatt (%)</label>
                <input type="number" id="avtalt_rabatt_prosent" name="avtalt_rabatt_prosent"
                       step="0.1" placeholder="F.eks. 10">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="startdato">Startdato</label>
                <input type="date" id="startdato" name="startdato">
            </div>
            <div class="form-group">
                <label for="sluttdato">Sluttdato</label>
                <input type="date" id="sluttdato" name="sluttdato">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="kontakt_person">Kontaktperson</label>
                <input type="text" id="kontakt_person" name="kontakt_person"
                       placeholder="F.eks. Ola Nordmann">
            </div>
            <div class="form-group">
                <label for="kontakt_epost">Kontakt e-post (for avviksvarsling)</label>
                <input type="email" id="kontakt_epost" name="kontakt_epost"
                       placeholder="F.eks. ola@firma.no">
            </div>
        </div>

        <div class="form-group">
            <label for="beskrivelse">Beskrivelse</label>
            <textarea id="beskrivelse" name="beskrivelse" rows="3"
                      placeholder="Kort beskrivelse av kontrakten..."></textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">Opprett kontrakt</button>
            <a href="{{ url_for('kontrakter_liste') }}" class="btn" style="background: var(--gray-100);">Avbryt</a>
        </div>
    </form>
</div>
{% endblock %}
